group 'io.daakia.daakia_vc_flutter_sdk'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'io.daakia.daakia_vc_flutter_sdk'
    compileSdk 35

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        minSdk 21
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
}